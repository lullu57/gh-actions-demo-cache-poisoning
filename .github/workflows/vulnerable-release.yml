# VULNERABLE: release workflow.
#
# Triggers on every push to main. Restores the shared cache (which the
# bundle-size workflow may have just poisoned), runs `npm install` and
# `npm run build`, and publishes to npm via OIDC trusted publishing.
#
# The build step bundles node_modules/is-number into dist/postinstall.js.
# If the cache contains a poisoned is-number, the published artifact's
# postinstall.js contains the attacker's code. Consumers running
# `npm install <this-package>` execute it.
#
# No npm token. No credential to steal. The workflow itself is the
# publishing authority, and the attacker did not need it — they just
# arranged for the workflow to bundle their code.

name: release (VULNERABLE)

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write    # OIDC trusted publishing to npm

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'    # Node 24 ships npm 11.x (required for trusted publishing OIDC)
          registry-url: 'https://registry.npmjs.org'

      - name: Print npm version
        # npm trusted publisher OIDC requires npm >= 11.5.1.
        run: |
          node --version
          npm --version

      - name: Restore cached node_modules
        # Same cache key as bundle-size. If the previous PR's bundle-size
        # run wrote to this cache, that's what we restore.
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ hashFiles('**/package-lock.json') }}

      - name: Install (no-op if cache hit)
        # `npm install` (not `npm ci`!) leaves an existing populated
        # node_modules in place. Poisoned files stay poisoned.
        run: npm install

      - name: Build
        # Bundles src/ + node_modules/* into dist/.
        # If node_modules/is-number/index.js is poisoned, dist/postinstall.js
        # ends up containing the attacker's bundled code.
        run: npm run build

      - name: Set deterministic version
        # For the demo: each workflow run gets a unique version derived
        # from the run number, so repeated demos don't collide on npm.
        # Real-world packages would use release-please / changesets / a
        # manual version bump in a separate PR.
        run: |
          NEW_VERSION="0.1.${{ github.run_number }}"
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Publishing version $NEW_VERSION"

      - name: Publish to npm
        run: npm publish --provenance --access public
